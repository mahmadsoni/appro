<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Appro">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12161F"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4CE0D2"/>
      <stop offset="0.55" stop-color="#8C6FE0"/>
      <stop offset="1" stop-color="#FF4FA3"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4CE0D2"/>
      <stop offset="1" stop-color="#FF4FA3"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4CE0D2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4CE0D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF4FA3" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FF4FA3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glassHighlight" cx="0.32" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="coreShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="118"/>
    </clipPath>
  </defs>

  <!-- Background shell -->
  <rect width="512" height="512" rx="118" fill="url(#bgGrad)"/>

  <g clip-path="url(#squircle)">
    <!-- Ambient glow blobs -->
    <circle cx="410" cy="120" r="150" fill="url(#glowCyan)" filter="url(#softBlur)"/>
    <circle cx="100" cy="420" r="160" fill="url(#glowMagenta)" filter="url(#softBlur)"/>

    <!-- Static "pulse" rings echoing the site's live trending animation -->
    <circle cx="256" cy="256" r="176" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.28"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.4"/>

    <!-- Core disc -->
    <circle cx="256" cy="256" r="112" fill="url(#coreGrad)" filter="url(#coreShadow)"/>
    <circle cx="256" cy="256" r="112" fill="url(#glassHighlight)"/>

    <!-- Appro signal waveform -->
    <path d="M158 256 H206 L228 200 L262 320 L286 256 H354"
          fill="none" stroke="#0B0E14" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  </g>
</svg>
